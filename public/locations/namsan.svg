<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ns" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF9A5C"/>
      <stop offset="0.55" stop-color="#C85A28"/>
      <stop offset="1" stop-color="#4A2010"/>
    </linearGradient>
  </defs>
  <rect width="480" height="270" fill="url(#ns)"/>
  <!-- 산 실루엣 -->
  <g fill="rgba(0,0,0,0.3)">
    <polygon points="0,270 80,140 200,200 280,120 400,180 480,150 480,270"/>
    <polygon points="0,270 60,180 160,220 240,160 360,200 480,170 480,270" opacity="0.5"/>
  </g>
  <!-- N서울타워 -->
  <g fill="rgba(0,0,0,0.45)">
    <rect x="234" y="40" width="12" height="100"/>
    <rect x="226" y="38" width="28" height="8" rx="2"/>
    <rect x="222" y="100" width="36" height="18" rx="3"/>
    <rect x="236" y="20" width="8" height="20"/>
    <rect x="238" y="10" width="4" height="12"/>
  </g>
  <!-- 타워 불빛 -->
  <g fill="rgba(255,220,150,0.8)">
    <rect x="230" y="104" width="4" height="4"/>
    <rect x="240" y="104" width="4" height="4"/>
    <rect x="250" y="104" width="4" height="4"/>
  </g>
  <!-- 해/달 -->
  <circle cx="400" cy="60" r="26" fill="rgba(255,200,120,0.85)"/>
  <!-- 나무 실루엣 -->
  <g fill="rgba(0,0,0,0.2)">
    <ellipse cx="60" cy="200" rx="30" ry="25"/>
    <rect x="57" y="220" width="6" height="20"/>
    <ellipse cx="420" cy="190" rx="25" ry="22"/>
    <rect x="417" y="208" width="6" height="18"/>
    <ellipse cx="350" cy="205" rx="20" ry="18"/>
    <rect x="347" y="220" width="6" height="16"/>
  </g>
  <!-- 별 -->
  <g fill="rgba(255,255,255,0.6)">
    <circle cx="100" cy="40" r="2"/>
    <circle cx="170" cy="55" r="2"/>
    <circle cx="320" cy="35" r="2"/>
    <circle cx="450" cy="45" r="2"/>
    <circle cx="50" cy="65" r="2"/>
  </g>
</svg>
