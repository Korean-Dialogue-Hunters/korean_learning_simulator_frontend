  </defs>
  <rect width="480" height="270" fill="url(#lw)"/>
  <!-- 관람차 -->
  <g stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none">
    <circle cx="120" cy="140" r="60"/>
    <line x1="120" y1="80" x2="120" y2="200"/>
    <line x1="60" y1="140" x2="180" y2="140"/>
    <line x1="78" y1="98" x2="162" y2="182"/>
