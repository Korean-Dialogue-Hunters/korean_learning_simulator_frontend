<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="lw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C8A8E8"/>
      <stop offset="0.55" stop-color="#7A4FA8"/>
      <stop offset="1" stop-color="#2E1B4F"/>
