  </g>
  <!-- 별 -->
  <g fill="rgba(255,255,255,0.7)">
    <circle cx="240" cy="50" r="2"/>
    <circle cx="320" cy="40" r="2"/>
    <circle cx="400" cy="55" r="2"/>
    <circle cx="450" cy="35" r="2"/>
    <circle cx="60" cy="40" r="2"/>
    <circle cx="200" cy="60" r="2"/>
